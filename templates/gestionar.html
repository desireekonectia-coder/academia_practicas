{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Gestión de la Academia</h1>
    
    <h3>1. Registrar Nuevo Usuario</h3>
    <form action="{{ url_for('gestionar_usuarios') }}" method="POST">
        <input type="text" name="nombre" placeholder="Nombre de usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <select name="rol">
            <option value="profesor">Profesor</option>
            <option value="alumno">Alumno</option>
        </select>
        <button type="submit">Registrar</button>
    </form>

  <div class="contenedor">
    <section>
        <h3>2. Asignar Horarios</h3>
        <form action="/admin/insertar_horario" method="POST">
            <select name="usuario_id" required>
                <option value="" disabled selected>Selecciona un Usuario</option>
                {% for usuario in lista_usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                {% endfor %}
            </select>

            <input type="text" name="dia" placeholder="Ej: Lunes" required>
            <input type="time" name="hora_inicio" required>
            <input type="text" name="actividad" placeholder="Ej: Clase de Matemáticas">
            <button type="submit">Guardar Horario</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>3. Programar Fecha de Examen</h3>
        <form action="/admin/insertar_examen" method="POST">
            <select name="alumno_id" required>
                <option value="" disabled selected>Selecciona el Alumno</option>
                {% for usuario in lista_usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                {% endfor %}
            </select>
            
            <input type="text" name="materia" placeholder="Asignatura" required>
            <input type="date" name="fecha" required>
            <input type="text" name="descripcion" placeholder="Detalles (opcional)">
            <button type="submit" style="background-color: #e67e22; color: white;">Programar Examen</button>
        </form>
    </section>
</div>

    <section>
        <h3>4. Notas de Exámenes</h3>
        <form action="/admin/insertar_nota" method="POST">
             <select name="alumno_id" required>
                <option value="" disabled selected>Selecciona un Usuario</option>
                {% for usuario in lista_usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                {% endfor %}
            </select>
            <input type="text" name="materia" placeholder="Materia" required>
            <input type="number" step="0.1" name="nota" placeholder="Nota" required>
            <input type="date" name="fecha">
            <button type="submit">Registrar Nota</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>5. Observaciones y Avisos</h3>
        <form action="/admin/insertar_observacion" method="POST">
             <select name="alumno_id" required>
                <option value="" disabled selected>Selecciona un Usuario</option>
                {% for usuario in lista_usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                {% endfor %}
            </select>
            <textarea name="texto" placeholder="Escribe aquí el aviso u observación..."></textarea>
            <input type="date" name="fecha">
            <button type="submit">Publicar Aviso</button>
        </form>
    </section>
</div>

<hr>

    <hr>
    <a href="{{ url_for('panel_admin') }}">Volver al Panel</a>
</div>
{% endblock %}
